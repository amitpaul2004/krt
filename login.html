<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkillSprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 flex items-center justify-center min-h-screen relative overflow-hidden selection:bg-indigo-500 selection:text-white">

    <!-- Background Decoration -->
    <div class="absolute top-[-20%] left-[-10%] w-[40rem] h-[40rem] bg-indigo-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[40rem] h-[40rem] bg-sky-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>

    <div class="w-full max-w-md px-4 relative z-10 reveal-scale">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 mb-6 group hover:scale-105 transition-transform">
                <div class="bg-indigo-600 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-200">
                    <i class="bi bi-rocket-takeoff-fill text-xl group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform inline-block"></i>
                </div>
                <span class="text-3xl font-black gradient-text tracking-tight">SkillSprint</span>
            </a>
            <h2 class="text-3xl font-black mb-2 text-slate-800">Welcome Back</h2>
            <p class="text-slate-500 font-medium">Enter your credentials to access your dashboard</p>
        </div>

        <div class="glass-card bg-white/80 p-8 rounded-[2rem] shadow-2xl border border-white/60 backdrop-blur-xl">
            <form id="login-form">
                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="email">Email Address</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="bi bi-envelope text-lg"></i>
                        </div>
                        <input type="email" id="email" name="email" class="input-field pl-11 py-3.5" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-8">
                    <div class="flex justify-between mb-2">
                        <label class="block text-sm font-bold text-slate-700" for="password">Password</label>
                        <a href="#" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="bi bi-lock text-lg"></i>
                        </div>
                        <input type="password" id="password" name="password" class="input-field pl-11 py-3.5 pr-12" placeholder="••••••••" required minlength="6">
                        <button type="button" class="password-toggle absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-indigo-600 transition-colors cursor-pointer">
                            <i class="bi bi-eye text-xl"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full btn-primary py-4 rounded-xl font-bold shadow-xl shadow-indigo-200 flex justify-center items-center gap-2 text-lg">
                    Login to Dashboard <i class="bi bi-box-arrow-in-right text-xl"></i>
                </button>
            </form>
            
            <p class="text-center mt-8 text-slate-600 font-medium">
                Don't have an account? <a href="signup.html" class="text-indigo-600 font-black hover:text-indigo-800 hover:underline transition-all">Sign up Free</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
